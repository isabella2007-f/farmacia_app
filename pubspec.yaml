name: farmacia_app
description: Gestión de medicamentos para farmacia

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  firebase_messaging: ^14.9.0
  cloud_functions: ^4.7.0
  
  # Estado
  provider: ^6.1.1
  
  # UI
  google_fonts: ^6.1.0
  flutter_local_notifications: ^17.1.0
  intl: ^0.18.1
  
  # Utilidades
  uuid: ^4.2.2
  shared_preferences: ^2.2.2
  
  # Email (mediante HTTP)
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/